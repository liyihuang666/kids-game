<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>小班听说游戏</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background-color: #F1F8E9;
      margin: 0;
      padding: 20px;
      text-align: center;
      -webkit-user-select: none;
      user-select: none;
    }

    #setup-screen {
      margin-top: 90px;
    }

    h1 {
      color: #2E7D32;
      margin-bottom: 24px;
      font-size: 48px;
      line-height: 1.25;
    }

    .big-btn {
      padding: 30px 60px;
      font-size: 30px;
      border-radius: 999px;
      background: #4CAF50;
      color: white;
      border: none;
      box-shadow: 0 10px 0 #2E7D32;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .small-text {
      color: #888;
      margin-top: 24px;
      font-size: 18px;
    }

    #scanner-screen {
      display: none;
      margin-top: 18px;
    }

    #reader-shell {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      border: 12px solid #fff;
      border-radius: 28px;
      overflow: hidden;
      background: #000;
      min-height: 320px;
    }

    #reader {
      width: 100%;
      min-height: 320px;
    }

    #status {
      font-size: 24px;
      color: #333;
      margin-top: 22px;
      font-weight: bold;
      line-height: 1.5;
      min-height: 40px;
    }

    .helper {
      color: #666;
      font-size: 18px;
      margin-top: 10px;
      line-height: 1.6;
    }

    #play-screen {
      display: none;
      margin-top: 40px;
    }

    #play-btn {
      display: inline-block;
      width: 220px;
      height: 220px;
      background: #FF9800;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 96px;
      box-shadow: 0 12px 0 #E65100;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 24px;
    }

    .status-big {
      font-size: 28px;
      color: #FF9800;
      margin: 10px 0 20px;
      font-weight: bold;
      line-height: 1.5;
    }

    .button-row {
      margin-top: 8px;
    }

    .action-btn {
      display: inline-block;
      min-width: 220px;
      padding: 20px 28px;
      margin: 10px 8px;
      font-size: 28px;
      border-radius: 24px;
      border: none;
      color: white;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .orange-btn {
      background: #FF9800;
      box-shadow: 0 8px 0 #E65100;
    }

    .green-btn {
      background: #4CAF50;
      box-shadow: 0 8px 0 #2E7D32;
    }

    .gray-btn {
      background: #90A4AE;
      box-shadow: 0 8px 0 #607D8B;
    }
  </style>
</head>
<body>
  <div id="setup-screen">
    <h1>听说游戏开始啦</h1>
    <button class="big-btn" id="start-btn">点我开始</button>
    <p class="small-text">(老师请帮小朋友点一下)</p>
  </div>

  <div id="scanner-screen">
    <div id="reader-shell">
      <div id="reader"></div>
    </div>
    <div id="status"></div>
    <div class="helper">请把二维码放近一点、摆正一点、光线亮一点</div>
  </div>

  <div id="play-screen">
    <button id="play-btn">▶️</button>
    <div class="status-big">找到声音啦！快点球球</div>

    <div class="button-row">
      <button class="action-btn orange-btn" id="replay-btn">再听一次</button>
      <button class="action-btn green-btn" id="rescan-btn">再扫一个</button>
    </div>

    <div class="button-row">
      <button class="action-btn gray-btn" id="stop-btn">停止播放</button>
    </div>
  </div>

  <audio id="audio-player" playsinline webkit-playsinline preload="auto"></audio>

  <script>
    const audio = document.getElementById("audio-player");
    const setupScreen = document.getElementById("setup-screen");
    const scannerScreen = document.getElementById("scanner-screen");
    const playScreen = document.getElementById("play-screen");
    const statusText = document.getElementById("status");
    const reader = document.getElementById("reader");

    const startBtn = document.getElementById("start-btn");
    const playBtn = document.getElementById("play-btn");
    const replayBtn = document.getElementById("replay-btn");
    const rescanBtn = document.getElementById("rescan-btn");
    const stopBtn = document.getElementById("stop-btn");

    let html5QrCode = null;
    let scannerRunning = false;
    let scanLocked = false;
    let currentAudioFile = "";

    function setStatus(text) {
      statusText.innerText = text || "";
    }

    function showHome() {
      setupScreen.style.display = "block";
      scannerScreen.style.display = "none";
      playScreen.style.display = "none";
      setStatus("");
    }

    function showScanner() {
      setupScreen.style.display = "none";
      scannerScreen.style.display = "block";
      playScreen.style.display = "none";
    }

    function showPlayer() {
      setupScreen.style.display = "none";
      scannerScreen.style.display = "none";
      playScreen.style.display = "block";
    }

    async function unlockAudio() {
      audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
      try {
        await audio.play();
        audio.pause();
        audio.currentTime = 0;
      } catch (e) {
        console.log("音频解锁失败:", e);
      }
    }

    function getQrboxSize(viewfinderWidth, viewfinderHeight) {
      const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
      const size = Math.floor(minEdge * 0.78);
      return {
        width: Math.max(220, Math.min(size, 380)),
        height: Math.max(220, Math.min(size, 380))
      };
    }

    async function destroyScanner() {
      try {
        if (html5QrCode && scannerRunning) {
          await html5QrCode.stop();
        }
      } catch (e) {
        console.log("stop scanner error:", e);
      }

      try {
        if (html5QrCode) {
          await html5QrCode.clear();
        }
      } catch (e) {
        console.log("clear scanner error:", e);
      }

      html5QrCode = null;
      scannerRunning = false;
      reader.innerHTML = "";
    }

    async function createScanner() {
      await destroyScanner();
      html5QrCode = new Html5Qrcode("reader", {
        formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE],
        verbose: false
      });
    }

    async function startScanner() {
      currentAudioFile = "";
      scanLocked = false;
      audio.pause();
      audio.currentTime = 0;

      if (!window.isSecureContext) {
        alert("请使用 GitHub Pages 的 https 链接打开。");
        showHome();
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert("当前浏览器不支持相机，请尽量使用 Safari。");
        showHome();
        return;
      }

      await unlockAudio();
      showScanner();
      setStatus("正在请求相机权限...");

      await createScanner();

      try {
        const tempStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        tempStream.getTracks().forEach(track => track.stop());
      } catch (e) {
        console.log("预请求相机失败:", e);
      }

      const config = {
        fps: 12,
        qrbox: getQrboxSize,
        rememberLastUsedCamera: false,
        showTorchButtonIfSupported: true,
        showZoomSliderIfSupported: true,
        experimentalFeatures: {
          useBarCodeDetectorIfSupported: false
        }
      };

      try {
        setStatus("请把二维码放到框内");
        await html5QrCode.start(
          { facingMode: "environment" },
          config,
          onScanSuccess,
          onScanFailure
        );
        scannerRunning = true;
      } catch (e) {
        console.log("启动后置相机失败:", e);
        try {
          await html5QrCode.start(
            { facingMode: "user" },
            { ...config, fps: 10 },
            onScanSuccess,
            onScanFailure
          );
          scannerRunning = true;
          setStatus("请把二维码放到框内");
        } catch (e2) {
          console.log("备用相机也失败:", e2);
          alert("相机启动失败，请检查 Safari 相机权限。");
          await destroyScanner();
          showHome();
        }
      }
    }

    function onScanFailure(error) {
      // 正常现象，不处理
    }

    async function onScanSuccess(decodedText) {
      if (scanLocked) return;
      scanLocked = true;

      const cleanText = String(decodedText || "").trim();
      if (!cleanText) {
        scanLocked = false;
        return;
      }

      currentAudioFile = cleanText + ".mp3";
      console.log("扫码结果:", currentAudioFile);

      // 先切到播放页
      showPlayer();

      // 立刻异步销毁扫码器，避免它继续改页面
      setTimeout(() => {
        destroyScanner();
      }, 0);

      try {
        audio.src = encodeURI(currentAudioFile);
        audio.load();
        await audio.play();
      } catch (e) {
        console.log("自动播放失败:", e);
      }
    }

    async function playCurrentAudio() {
      if (!currentAudioFile) return;

      try {
        audio.src = encodeURI(currentAudioFile);
        audio.load();
        await audio.play();
      } catch (e) {
        console.log("播放失败:", e);
      }
    }

    function stopAudio() {
      audio.pause();
      audio.currentTime = 0;
    }

    async function rescanNext() {
      stopAudio();
      currentAudioFile = "";
      scanLocked = false;
      await startScanner();
    }

    startBtn.addEventListener("click", startScanner);
    playBtn.addEventListener("click", playCurrentAudio);
    replayBtn.addEventListener("click", playCurrentAudio);
    stopBtn.addEventListener("click", stopAudio);
    rescanBtn.addEventListener("click", rescanNext);
  </script>
</body>
</html>
