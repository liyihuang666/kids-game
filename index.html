<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>小班听说游戏</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background-color: #F1F8E9;
      margin: 0;
      padding: 20px;
      text-align: center;
      -webkit-user-select: none;
      user-select: none;
    }

    #setup-screen {
      margin-top: 90px;
    }

    h1 {
      color: #2E7D32;
      margin-bottom: 24px;
    }

    .big-btn {
      padding: 30px 56px;
      font-size: 30px;
      border-radius: 999px;
      background: #4CAF50;
      color: white;
      border: none;
      box-shadow: 0 10px 0 #2E7D32;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #reader-wrap {
      display: none;
      margin-top: 18px;
    }

    #reader {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      border: 12px solid white;
      border-radius: 28px;
      overflow: hidden;
      background: #000;
    }

    #status {
      font-size: 24px;
      color: #333;
      margin-top: 20px;
      font-weight: bold;
      line-height: 1.5;
      min-height: 38px;
    }

    .helper {
      color: #666;
      font-size: 18px;
      margin-top: 10px;
      line-height: 1.6;
    }

    #play-screen {
      display: none;
      margin-top: 34px;
    }

    #play-btn {
      display: inline-block;
      width: 210px;
      height: 210px;
      background: #FF9800;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 92px;
      box-shadow: 0 12px 0 #E65100;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 24px;
    }

    .status-big {
      font-size: 26px;
      color: #FF9800;
      margin: 12px 0 20px;
      font-weight: bold;
      line-height: 1.5;
    }

    .small-text {
      color: #888;
      margin-top: 24px;
      font-size: 18px;
    }

    .button-row {
      margin-top: 10px;
    }

    .action-btn {
      display: inline-block;
      min-width: 210px;
      padding: 18px 24px;
      margin: 10px 8px;
      font-size: 26px;
      border-radius: 22px;
      border: none;
      color: white;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .green-btn {
      background: #4CAF50;
      box-shadow: 0 8px 0 #2E7D32;
    }

    .orange-btn {
      background: #FF9800;
      box-shadow: 0 8px 0 #E65100;
    }

    .gray-btn {
      background: #90A4AE;
      box-shadow: 0 8px 0 #607D8B;
    }
  </style>
</head>
<body>
  <div id="setup-screen">
    <h1>听说游戏开始啦</h1>
    <button class="big-btn" id="start-btn">点我开始</button>
    <p class="small-text">(老师请帮小朋友点一下)</p>
  </div>

  <div id="reader-wrap">
    <div id="reader"></div>
    <div id="status"></div>
    <div class="helper">请把二维码放近一点、摆正一点、光线亮一点</div>
  </div>

  <div id="play-screen">
    <button id="play-btn">▶️</button>
    <div class="status-big">找到声音啦！快点球球</div>

    <div class="button-row">
      <button class="action-btn orange-btn" id="replay-btn">再听一次</button>
      <button class="action-btn green-btn" id="rescan-btn">再扫一个</button>
    </div>

    <div class="button-row">
      <button class="action-btn gray-btn" id="stop-btn">停止播放</button>
    </div>
  </div>

  <audio id="audio-player" playsinline webkit-playsinline preload="auto"></audio>

<script>
    const audio = document.getElementById("audio-player");
    const setupScreen = document.getElementById("setup-screen");
    const reader = document.getElementById("reader");
    const statusText = document.getElementById("status");
    const playScreen = document.getElementById("play-screen");
    const playBtn = document.getElementById("play-btn");

    let html5QrCode = null;
    let scannerStarted = false;
    let scanHandled = false;   // 新增：是否已经成功扫码
    let currentAudioFile = ""; // 新增：当前音频名

    async function unlockAudio() {
        audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
        try {
            await audio.play();
            audio.pause();
            audio.currentTime = 0;
        } catch (e) {
            console.log("音频解锁失败:", e);
        }
    }

    function setStatus(text) {
        statusText.style.display = "block";
        statusText.innerText = text;
    }

    function showScanner() {
        setupScreen.style.display = "none";
        reader.style.display = "block";
        statusText.style.display = "block";
        playScreen.style.display = "none";
        playBtn.style.display = "none";
    }

    function showPlayer() {
        setupScreen.style.display = "none";
        reader.style.display = "none";
        statusText.style.display = "none";
        playScreen.style.display = "block";
        playBtn.style.display = "block";
    }

    async function stopScannerSilently() {
        try {
            if (scannerStarted && html5QrCode) {
                await html5QrCode.stop();
            }
        } catch (e) {
            console.log("停止扫码器失败(忽略):", e);
        }
        scannerStarted = false;
    }

    async function startApp() {
        scanHandled = false;
        currentAudioFile = "";

        try {
            await unlockAudio();

            showScanner();
            setStatus("正在请求相机权限...");

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("当前浏览器不支持摄像头。请使用 Safari 打开这个网页。");
                resetGame();
                return;
            }

            if (!window.isSecureContext) {
                alert("当前网页不是安全环境，摄像头无法开启。请确认使用的是 GitHub Pages 的 https 链接。");
                resetGame();
                return;
            }

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            try {
                const tempStream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: false
                });
                tempStream.getTracks().forEach(track => track.stop());
            } catch (permErr) {
                console.log("相机权限预请求失败:", permErr);
            }

            setStatus("正在寻找可用摄像头...");

            const devices = await Html5Qrcode.getCameras();

            if (!devices || devices.length === 0) {
                alert("没有检测到摄像头。请检查 iPhone/iPad 的相机权限，并尽量使用 Safari 打开。");
                resetGame();
                return;
            }

            console.log("可用摄像头:", devices);

            let backCamera = devices.find(device =>
                /back|rear|environment|后|背面/i.test(device.label)
            );

            const cameraId = backCamera ? backCamera.id : devices[0].id;

            const config = {
                fps: 10,
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0,
                rememberLastUsedCamera: true,
                showTorchButtonIfSupported: true,
                showZoomSliderIfSupported: true
            };

            setStatus("正在启动摄像头...");

            await html5QrCode.start(
                cameraId,
                config,
                onScanSuccess,
                onScanFailure
            );

            scannerStarted = true;
            setStatus("请把二维码放到框内");
        } catch (err) {
            console.error("启动摄像头失败:", err);

            // 关键修复：
            // 如果已经成功扫码并切到播放页了，后续相机内部再抛错，直接忽略
            if (scanHandled) {
                console.log("已成功扫码，忽略后续相机异常");
                return;
            }

            let msg = "相机启动失败。";

            if (err && err.name === "NotAllowedError") {
                msg += "\n请到系统设置或 Safari 设置中允许相机权限。";
            } else if (err && err.name === "NotFoundError") {
                msg += "\n没有找到可用摄像头。";
            } else if (err && err.name === "NotReadableError") {
                msg += "\n摄像头可能正被其他程序占用。";
            } else {
                msg += "\n请尽量使用 Safari 打开，不要在微信或其他内置浏览器中打开。";
            }

            alert(msg);
            resetGame();
        }
    }

    function onScanFailure(error) {
        // 扫描过程中频繁失败属于正常现象，这里不弹窗
    }

    async function onScanSuccess(decodedText) {
        if (scanHandled) return; // 防重复触发
        scanHandled = true;

        try {
            currentAudioFile = decodedText.trim() + ".mp3";
            console.log("扫码结果:", decodedText, "=>", currentAudioFile);

            // 先切页面，先保证用户看到正确界面
            showPlayer();

            audio.src = encodeURI(currentAudioFile);

            try {
                await audio.play();
            } catch (e) {
                console.log("自动播放失败，需要手动点击:", e);
            }

            // 再静默关闭相机，不要因为 stop 出错影响界面
            stopScannerSilently();
        } catch (err) {
            console.error("扫码成功后处理失败:", err);
            alert("二维码识别成功，但播放音频失败。请检查 mp3 文件名是否和二维码内容一致。");
        }
    }

    function playAudio() {
        if (!currentAudioFile) return;

        audio.src = encodeURI(currentAudioFile);
        audio.play().catch(err => {
            console.log("手动播放失败:", err);
            alert("播放失败，请确认音频文件存在，并且文件名和二维码内容一致。");
        });
    }

    async function resetGame() {
        scanHandled = false;
        currentAudioFile = "";

        await stopScannerSilently();

        audio.pause();
        audio.currentTime = 0;

        setupScreen.style.display = "block";
        reader.style.display = "none";
        playScreen.style.display = "none";
        statusText.style.display = "none";
        playBtn.style.display = "none";
    }
</script>  
</body>
</html>
