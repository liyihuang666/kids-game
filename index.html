<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>小班听说游戏 | 可配置音频路径</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            background-color: #F1F8E9;
            margin: 0;
            padding: 0;
            text-align: center;
            min-height: 100vh;
            position: relative;
        }

        .screen {
            transition: opacity 0.2s ease;
        }

        #setup-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .big-btn {
            padding: 28px 60px;
            font-size: 32px;
            border-radius: 80px;
            background: #4CAF50;
            color: white;
            border: none;
            box-shadow: 0 12px 0 #2E7D32;
            cursor: pointer;
            transition: 0.05s linear;
            font-weight: bold;
            margin-top: 20px;
        }
        .big-btn:active {
            transform: translateY(3px);
            box-shadow: 0 8px 0 #2E7D32;
        }

        #scanner-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1e2a1e;
            z-index: 10;
            padding-top: 20px;
            box-sizing: border-box;
            overflow: auto;
        }

        #reader {
            width: 90%;
            max-width: 480px;
            margin: 20px auto 0;
            border-radius: 48px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 1 / 1;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .scanner-footer {
            margin-top: 30px;
            text-align: center;
        }
        .back-home-btn {
            background: #FFB74D;
            border: none;
            padding: 12px 28px;
            font-size: 20px;
            border-radius: 60px;
            font-weight: bold;
            color: #3e2723;
            box-shadow: 0 4px 0 #F57C00;
            cursor: pointer;
            margin-top: 15px;
        }
        .status-text {
            font-size: 22px;
            color: white;
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 60px;
            margin: 16px auto;
            backdrop-filter: blur(4px);
        }

        #play-screen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #F1F8E9;
            box-sizing: border-box;
            text-align: center;
            padding: 36px 20px 24px;
            overflow-y: auto;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #play-btn {
            width: 220px;
            height: 220px;
            background: #FF9800;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 90px;
            margin: 20px auto;
            box-shadow: 0 12px 0 #E65100;
            cursor: pointer;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #play-btn:active {
            transform: translateY(4px);
            box-shadow: 0 6px 0 #E65100;
        }

        .status {
            font-size: 28px;
            color: #2E7D32;
            font-weight: bold;
            margin: 12px 0;
        }

        .small-text {
            color: #5d6e5a;
            margin-top: 18px;
            font-size: 18px;
        }

        .action-row {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .action-btn {
            min-width: 160px;
            padding: 14px 22px;
            font-size: 24px;
            border-radius: 60px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
        }
        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
        }
        .green-btn { background: #4CAF50; }
        .orange-btn { background: #FF9800; }
        .gray-btn { background: #78909C; }

        .loading-tip {
            font-size: 18px;
            color: #ffe0b5;
            margin-top: 20px;
        }
        .audio-loading {
            font-size: 20px;
            color: #FF9800;
            margin-top: 8px;
            font-weight: normal;
            background: rgba(255,152,0,0.2);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
        }
        .debug-info {
            font-size: 14px;
            color: #999;
            margin-top: 20px;
            word-break: break-all;
            background: #eee;
            padding: 8px;
            border-radius: 12px;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }
        @media (max-width: 550px) {
            .big-btn { padding: 20px 44px; font-size: 28px; }
            #play-btn { width: 180px; height: 180px; font-size: 72px; }
            .action-btn { min-width: 130px; font-size: 20px; padding: 12px 16px; }
            .status { font-size: 24px; }
        }
    </style>
</head>
<body>

<div id="setup-screen" class="screen">
    <h1 style="color: #2E7D32;">🎧 听说游戏 🎤</h1>
    <button class="big-btn" id="start-btn">🔍 点我开始</button>
    <p class="small-text">(老师请帮小朋友点一下，开启相机)</p>
</div>

<div id="scanner-screen" class="screen">
    <div id="reader"></div>
    <div class="scanner-footer">
        <div id="scanner-status" class="status-text">⚡ 准备就绪</div>
        <button class="back-home-btn" id="manual-home-btn">🏠 返回首页</button>
    </div>
    <div class="loading-tip">📷 请将二维码置于框内，自动识别</div>
</div>

<div id="play-screen" class="screen">
    <button id="play-btn">🔊</button>
    <p class="status" style="color:#EF6C00;">✨ 找到声音啦！点大球听故事 ✨</p>
    <div id="audio-loading-status" class="audio-loading" style="display: none;">⏳ 音频加载中，请稍后...</div>
    <div id="debug-url" class="debug-info" style="display: none;"></div>
    <div class="action-row">
        <button class="action-btn orange-btn" id="replay-btn">🔁 再听一次</button>
        <button class="action-btn green-btn" id="rescan-new-btn">📷 再扫一个</button>
    </div>
    <div class="action-row">
        <button class="action-btn gray-btn" id="stop-audio-btn">⏹️ 停止播放</button>
    </div>
    <p class="small-text">🎵 扫不同卡片，听不同声音~</p>
</div>

<audio id="audio-player" preload="auto" playsinline webkit-playsinline></audio>

<script>
    // ========== 可配置项：音频文件存放的基础路径 ==========
    // 如果音频和HTML在同一目录，请留空 "" 
    // 如果在子目录 audio 下，请设置为 "./audio/" 或 "audio/"
    // 如果使用CDN，请设置为 "https://your-domain.com/path/"
    const AUDIO_BASE_URL = "";   // 👈 请根据实际情况修改！例如 "./audio/" 或 "https://xxx.com/audio/"
    // ====================================================

    // ---------- DOM 元素 ----------
    const setupScreen = document.getElementById("setup-screen");
    const scannerScreen = document.getElementById("scanner-screen");
    const playScreen = document.getElementById("play-screen");
    const readerDiv = document.getElementById("reader");
    const scannerStatusSpan = document.getElementById("scanner-status");
    const audioPlayer = document.getElementById("audio-player");
    const playBtn = document.getElementById("play-btn");
    const replayBtn = document.getElementById("replay-btn");
    const rescanNewBtn = document.getElementById("rescan-new-btn");
    const stopAudioBtn = document.getElementById("stop-audio-btn");
    const startBtn = document.getElementById("start-btn");
    const manualHomeBtn = document.getElementById("manual-home-btn");
    const audioLoadingDiv = document.getElementById("audio-loading-status");
    const debugUrlDiv = document.getElementById("debug-url");

    // ---------- 全局变量 ----------
    let html5QrCode = null;
    let isScanning = false;
    let isProcessing = false;
    let currentAudioFile = "";        // 存储文件名（不含路径）
    let lastScannedCode = "";
    let currentLoadingTimeout = null;
    let playPromise = null;

    // ---------- 辅助函数 ----------
    function setScannerStatus(msg, isError = false) {
        if (scannerStatusSpan) {
            scannerStatusSpan.innerText = msg;
            scannerStatusSpan.style.background = isError ? "rgba(180, 50, 40, 0.8)" : "rgba(0,0,0,0.65)";
        }
    }

    // 显示/隐藏加载状态
    function showAudioLoading(show) {
        if (show) {
            if (currentLoadingTimeout) clearTimeout(currentLoadingTimeout);
            audioLoadingDiv.style.display = "inline-block";
            audioLoadingDiv.innerText = "⏳ 音频加载中，请稍后...";
        } else {
            audioLoadingDiv.style.display = "none";
        }
    }

    // 获取完整音频URL
    function getFullAudioUrl(fileName) {
        // 确保 base URL 末尾有斜杠（除非为空）
        let base = AUDIO_BASE_URL;
        if (base && !base.endsWith('/')) {
            base += '/';
        }
        // 对文件名进行编码，保留路径分隔符（不编码斜杠）
        let encodedFile = fileName.split('/').map(part => encodeURIComponent(part)).join('/');
        return base + encodedFile;
    }

    // 核心播放函数：等待缓冲完成再播放，支持重试
    async function playAudioWithBuffer(fileName, retryCount = 0) {
        const fullUrl = getFullAudioUrl(fileName);
        console.log(`[播放] 尝试加载: ${fullUrl}`);
        
        return new Promise((resolve, reject) => {
            // 停止当前播放并重置
            if (audioPlayer.src !== fullUrl) {
                audioPlayer.pause();
                audioPlayer.removeAttribute('src');
                audioPlayer.load();
            }
            
            audioPlayer.src = fullUrl;
            audioPlayer.load();
            
            let loaded = false;
            let timeoutId = null;
            
            const cleanup = () => {
                if (timeoutId) clearTimeout(timeoutId);
                audioPlayer.removeEventListener('canplaythrough', onCanPlay);
                audioPlayer.removeEventListener('error', onError);
                audioPlayer.removeEventListener('stalled', onStalled);
            };
            
            const onCanPlay = () => {
                if (loaded) return;
                loaded = true;
                cleanup();
                // 尝试自动播放
                const playAttempt = audioPlayer.play();
                if (playAttempt !== undefined) {
                    playAttempt.then(() => {
                        resolve();
                    }).catch(err => {
                        console.warn("自动播放被拦截，用户可手动点击", err);
                        resolve(); // 加载成功但播放需要手势，不算失败
                    });
                } else {
                    resolve();
                }
            };
            
            const onError = (e) => {
                if (loaded) return;
                cleanup();
                const errorMsg = `音频加载失败 (${fullUrl})`;
                console.error(errorMsg, e);
                // 尝试重试一次
                if (retryCount < 1) {
                    console.log(`重试加载: ${fileName} (第${retryCount+1}次)`);
                    setTimeout(() => {
                        playAudioWithBuffer(fileName, retryCount + 1).then(resolve).catch(reject);
                    }, 500);
                } else {
                    reject(new Error(`无法加载音频文件: ${fileName}\n请求地址: ${fullUrl}\n请检查文件是否存在、路径是否正确。`));
                }
            };
            
            const onStalled = () => {
                if (!loaded && retryCount < 1) {
                    console.log("音频加载停滞，尝试重新加载");
                    cleanup();
                    setTimeout(() => {
                        playAudioWithBuffer(fileName, retryCount + 1).then(resolve).catch(reject);
                    }, 800);
                }
            };
            
            audioPlayer.addEventListener('canplaythrough', onCanPlay);
            audioPlayer.addEventListener('error', onError);
            audioPlayer.addEventListener('stalled', onStalled);
            
            timeoutId = setTimeout(() => {
                if (!loaded) {
                    cleanup();
                    reject(new Error(`音频加载超时 (${fullUrl})，请检查网络或文件大小`));
                }
            }, 10000); // 10秒超时
        });
    }
    
    // 外部调用播放（带UI反馈）
    async function playCurrentAudio() {
        if (!currentAudioFile) {
            alert("没有可播放的音频，请先扫描二维码。");
            return false;
        }
        
        // 显示加载状态
        showAudioLoading(true);
        // 显示调试URL（方便用户排查）
        const fullUrl = getFullAudioUrl(currentAudioFile);
        debugUrlDiv.innerText = `🎵 请求地址: ${fullUrl}`;
        debugUrlDiv.style.display = "block";
        
        try {
            await playAudioWithBuffer(currentAudioFile);
            showAudioLoading(false);
            // 3秒后隐藏调试信息
            setTimeout(() => {
                if (debugUrlDiv.style.display === "block") {
                    debugUrlDiv.style.display = "none";
                }
            }, 5000);
            return true;
        } catch (err) {
            console.error("播放失败:", err);
            showAudioLoading(false);
            // 显示详细错误信息
            alert(err.message);
            // 保留调试信息，方便查看
            return false;
        }
    }
    
    function stopAudio() {
        audioPlayer.pause();
        audioPlayer.currentTime = 0;
        showAudioLoading(false);
        // 不隐藏调试信息，用户可看到上次加载的URL
    }
    
    // 彻底停止并销毁扫码器
    async function destroyScanner() {
        if (html5QrCode && isScanning) {
            try {
                await html5QrCode.stop();
            } catch (e) {
                console.warn("停止扫码器时出错(可忽略):", e);
            }
            isScanning = false;
        }
        if (html5QrCode) {
            try {
                if (html5QrCode.isScanning) await html5QrCode.stop();
            } catch(e) {}
            html5QrCode = null;
        }
        // 释放所有视频轨道
        if (window.stream && window.stream.getTracks) {
            window.stream.getTracks().forEach(track => {
                if (track.readyState === 'live' && track.kind === 'video') {
                    track.stop();
                }
            });
            window.stream = null;
        }
        const videos = document.querySelectorAll("#reader video");
        videos.forEach(video => {
            if (video.srcObject) {
                const tracks = video.srcObject.getTracks();
                tracks.forEach(t => t.stop());
                video.srcObject = null;
            }
        });
    }
    
    // 重置所有界面到首页
    async function fullResetToHome() {
        if (isProcessing) return;
        isProcessing = true;
        stopAudio();
        currentAudioFile = "";
        lastScannedCode = "";
        await destroyScanner();
        setupScreen.style.display = "flex";
        scannerScreen.style.display = "none";
        playScreen.style.display = "none";
        debugUrlDiv.style.display = "none";
        isProcessing = false;
    }
    
    // 显示扫码界面并启动相机
    async function showAndStartScanner() {
        if (isProcessing) {
            console.log("正在处理中，稍后再试");
            return false;
        }
        isProcessing = true;
        
        await destroyScanner();
        
        setupScreen.style.display = "none";
        playScreen.style.display = "none";
        scannerScreen.style.display = "block";
        setScannerStatus("🔐 请求相机权限...");
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert("当前浏览器不支持摄像头。请使用 Safari 或 系统浏览器打开。");
            await fullResetToHome();
            isProcessing = false;
            return false;
        }
        if (!window.isSecureContext) {
            alert("请使用 HTTPS 网页访问（GitHub Pages 或本地测试需用 https/localhost）");
            await fullResetToHome();
            isProcessing = false;
            return false;
        }
        
        try {
            const tempStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            tempStream.getTracks().forEach(t => t.stop());
        } catch (permErr) {
            console.warn("预授权失败", permErr);
        }
        
        setScannerStatus("📷 寻找摄像头...");
        try {
            const devices = await Html5Qrcode.getCameras();
            if (!devices || devices.length === 0) {
                alert("未检测到摄像头，请检查权限或在 Safari 中开启相机。");
                await fullResetToHome();
                isProcessing = false;
                return false;
            }
            let backCam = devices.find(device => 
                /back|rear|environment|后置|背面/i.test(device.label)
            );
            const cameraId = backCam ? backCam.id : devices[0].id;
            
            html5QrCode = new Html5Qrcode("reader");
            const config = {
                fps: 12,
                qrbox: { width: 260, height: 260 },
                aspectRatio: 1.0,
                showTorchButtonIfSupported: true,
                showZoomSliderIfSupported: true,
                rememberLastUsedCamera: true
            };
            
            setScannerStatus("🚀 启动相机中...");
            await html5QrCode.start(
                cameraId,
                config,
                (decodedText) => onScanSuccess(decodedText),
                (errorMsg) => { /* 静默 */ }
            );
            isScanning = true;
            setScannerStatus("✅ 对准二维码，自动识别");
            isProcessing = false;
            return true;
        } catch (err) {
            console.error("启动相机彻底失败:", err);
            let errorMsg = "相机启动失败。";
            if (err && err.name === "NotAllowedError") {
                errorMsg += " 请在设置中允许相机权限。";
            } else if (err && err.name === "NotFoundError") {
                errorMsg += " 未找到摄像头设备。";
            } else if (err && err.name === "NotReadableError") {
                errorMsg += " 摄像头被占用，请关闭其他相机应用。";
            } else {
                errorMsg += " 推荐使用 Safari 浏览器打开。";
            }
            alert(errorMsg);
            await fullResetToHome();
            isProcessing = false;
            return false;
        }
    }
    
    // 扫码成功后的处理
    async function onScanSuccess(decodedText) {
        if (isProcessing) {
            console.log("已有操作进行中，忽略本次扫码");
            return;
        }
        if (lastScannedCode === decodedText && currentAudioFile !== "") {
            console.log("相同二维码已处理过，不重复触发");
            return;
        }
        
        isProcessing = true;
        lastScannedCode = decodedText;
        const fileName = (decodedText || "").trim() + ".mp3";
        currentAudioFile = fileName;
        console.log(`扫码成功: ${decodedText} -> 音频: ${fileName}`);
        
        // 停止相机并隐藏扫码界面
        if (html5QrCode && isScanning) {
            try {
                await html5QrCode.stop();
            } catch(e) { console.warn("停止相机失败", e); }
            isScanning = false;
        }
        scannerScreen.style.display = "none";
        playScreen.style.display = "flex";
        
        // 显示加载状态和调试信息
        showAudioLoading(true);
        const fullUrl = getFullAudioUrl(fileName);
        debugUrlDiv.innerText = `🎵 请求地址: ${fullUrl}`;
        debugUrlDiv.style.display = "block";
        
        // 预加载并自动播放
        try {
            await playAudioWithBuffer(fileName);
            showAudioLoading(false);
            // 5秒后隐藏调试信息
            setTimeout(() => {
                if (debugUrlDiv.style.display === "block") {
                    debugUrlDiv.style.display = "none";
                }
            }, 5000);
        } catch (err) {
            console.error("自动播放失败:", err);
            showAudioLoading(false);
            alert(err.message);
            // 保留调试信息
        }
        
        isProcessing = false;
    }
    
    // 手动播放
    async function handleManualPlay() {
        if (!currentAudioFile) {
            alert("请先扫描二维码");
            return;
        }
        await playCurrentAudio();
    }
    
    // 再扫一个
    async function rescanCard() {
        if (isProcessing) {
            console.log("正在处理切换，请稍后");
            return;
        }
        stopAudio();
        currentAudioFile = "";
        lastScannedCode = "";
        playScreen.style.display = "none";
        debugUrlDiv.style.display = "none";
        await destroyScanner();
        await showAndStartScanner();
    }
    
    // 解锁音频上下文
    async function unlockAudioContext() {
        // 使用一个极短静音文件激活audio元素
        audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
        try {
            await audioPlayer.play();
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            console.log("音频上下文已解锁");
        } catch (e) {
            console.log("解锁失败，但不影响手动播放");
        }
    }
    
    // 事件绑定
    async function initEventListeners() {
        startBtn.onclick = async () => {
            await unlockAudioContext();
            await showAndStartScanner();
        };
        
        rescanNewBtn.onclick = async () => {
            await rescanCard();
        };
        
        replayBtn.onclick = async () => {
            await handleManualPlay();
        };
        
        stopAudioBtn.onclick = () => {
            stopAudio();
        };
        
        playBtn.onclick = async () => {
            await handleManualPlay();
        };
        
        manualHomeBtn.onclick = async () => {
            await fullResetToHome();
        };
    }
    
    // 页面启动
    (function bootstrap() {
        setupScreen.style.display = "flex";
        scannerScreen.style.display = "none";
        playScreen.style.display = "none";
        initEventListeners();
        if (html5QrCode) {
            destroyScanner().catch(e=>console.log);
        }
        // 全局触摸解锁
        const globalUnlock = async () => {
            await unlockAudioContext();
            document.body.removeEventListener("touchstart", globalUnlock);
            document.body.removeEventListener("click", globalUnlock);
        };
        document.body.addEventListener("touchstart", globalUnlock, { once: true });
        document.body.addEventListener("click", globalUnlock, { once: true });
        console.log("游戏已准备，音频基础路径:", AUDIO_BASE_URL || "(当前目录)");
    })();
    
    // 页面可见性处理
    document.addEventListener("visibilitychange", async () => {
        if (document.hidden && isScanning && html5QrCode) {
            try {
                await html5QrCode.stop();
                isScanning = false;
                console.log("页面后台，相机已暂停");
            } catch(e) {}
        } else if (!document.hidden && scannerScreen.style.display === "block" && !isScanning && html5QrCode) {
            if (html5QrCode && !isScanning) {
                try {
                    const devices = await Html5Qrcode.getCameras();
                    if (devices && devices.length) {
                        let backCam = devices.find(device => /back|rear|environment/i.test(device.label));
                        const camId = backCam ? backCam.id : devices[0].id;
                        await html5QrCode.start(camId, { fps: 10, qrbox: { width: 250, height: 250 } },
                            (text) => onScanSuccess(text),
                            () => {});
                        isScanning = true;
                        setScannerStatus("✅ 恢复扫描，对准二维码");
                    }
                } catch(e) { console.warn("恢复相机失败", e); }
            }
        }
    });
    
    // 兜底重启
    setInterval(() => {
        if (scannerScreen.style.display === "block" && !isProcessing && (!isScanning || !html5QrCode)) {
            console.log("检测到扫码界面但相机未运行，尝试重启");
            showAndStartScanner().catch(e=>console.warn);
        }
    }, 4000);
</script>
</body>
</html>
