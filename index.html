<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>小班听说游戏</title>

    <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            background-color: #F1F8E9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        #setup-screen {
            margin-top: 110px;
        }

        .big-btn {
            padding: 38px 76px;
            font-size: 32px;
            border-radius: 80px;
            background: #4CAF50;
            color: white;
            border: none;
            box-shadow: 0 12px 0 #2E7D32;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #scanner-screen {
            display: none;
        }

        #reader {
            width: 100%;
            max-width: 500px;
            margin: 20px auto 0;
            border: 15px solid white;
            border-radius: 40px;
            overflow: hidden;
            background: #000;
            min-height: 300px;
        }

        #play-screen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #F1F8E9;
            padding: 36px 20px 24px;
            box-sizing: border-box;
            overflow: auto;
            text-align: center;
        }

        #play-btn {
            display: inline-block;
            width: 240px;
            height: 240px;
            background: #FF9800;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 100px;
            margin: 50px auto 24px;
            box-shadow: 0 15px 0 #E65100;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .status {
            font-size: 26px;
            color: #333;
            margin-top: 26px;
            font-weight: bold;
            line-height: 1.5;
        }

        .small-text {
            color: #888;
            margin-top: 30px;
            font-size: 18px;
        }

        .action-row {
            margin-top: 10px;
        }

        .action-btn {
            display: inline-block;
            min-width: 210px;
            padding: 18px 24px;
            margin: 10px 8px;
            font-size: 26px;
            border-radius: 24px;
            border: none;
            color: white;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .green-btn {
            background: #4CAF50;
            box-shadow: 0 8px 0 #2E7D32;
        }

        .orange-btn {
            background: #FF9800;
            box-shadow: 0 8px 0 #E65100;
        }

        .gray-btn {
            background: #90A4AE;
            box-shadow: 0 8px 0 #607D8B;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #2E7D32;">听说游戏开始啦</h1>
        <button class="big-btn" onclick="startApp()">点我开始</button>
        <p class="small-text">(老师请帮小朋友点一下)</p>
    </div>

    <div id="scanner-screen">
        <div id="reader"></div>
        <div id="status" class="status"></div>
    </div>

    <div id="play-screen">
        <button id="play-btn" onclick="playAudio()">▶️</button>
        <p class="status" style="color: #FF9800;">找到声音啦！快点球球</p>

        <div class="action-row">
            <button class="action-btn orange-btn" onclick="playAudio()">再听一次</button>
            <button class="action-btn green-btn" onclick="rescanCard()">再扫一个</button>
        </div>

        <div class="action-row">
            <button class="action-btn gray-btn" onclick="stopAudio()">停止播放</button>
        </div>
    </div>

    <audio id="audio-player" playsinline webkit-playsinline></audio>

    <script>
        const audio = document.getElementById("audio-player");
        const setupScreen = document.getElementById("setup-screen");
        const scannerScreen = document.getElementById("scanner-screen");
        const reader = document.getElementById("reader");
        const statusText = document.getElementById("status");
        const playScreen = document.getElementById("play-screen");
        const playBtn = document.getElementById("play-btn");

        let html5QrCode = null;
        let scannerStarted = false;
        let scanHandled = false;
        let currentAudioFile = "";

        async function unlockAudio() {
            audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
            try {
                await audio.play();
                audio.pause();
                audio.currentTime = 0;
            } catch (e) {
                console.log("音频解锁失败:", e);
            }
        }

        function setStatus(text) {
            statusText.innerText = text || "";
        }

        function showScannerUI() {
            setupScreen.style.display = "none";
            scannerScreen.style.display = "block";
            playScreen.style.display = "none";
        }

        function showPlayerUI() {
            playScreen.style.display = "block";
        }

        async function stopScannerSilently() {
            if (scannerStarted && html5QrCode) {
                try {
                    await html5QrCode.stop();
                } catch (e) {
                    console.log("停止扫码器失败，已忽略:", e);
                }
            }
            scannerStarted = false;
        }

        async function startApp() {
            scanHandled = false;
            currentAudioFile = "";

            try {
                await unlockAudio();

                showScannerUI();
                setStatus("正在请求相机权限...");

                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("当前浏览器不支持摄像头。请使用 Safari 打开这个网页。");
                    resetToHome();
                    return;
                }

                if (!window.isSecureContext) {
                    alert("当前网页不是安全环境，摄像头无法开启。请确认使用的是 GitHub Pages 的 https 链接。");
                    resetToHome();
                    return;
                }

                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode("reader");
                }

                try {
                    const tempStream = await navigator.mediaDevices.getUserMedia({
                        video: true,
                        audio: false
                    });
                    tempStream.getTracks().forEach(track => track.stop());
                } catch (permErr) {
                    console.log("相机权限预请求失败:", permErr);
                }

                setStatus("正在寻找可用摄像头...");

                const devices = await Html5Qrcode.getCameras();

                if (!devices || devices.length === 0) {
                    alert("没有检测到摄像头。请检查 iPhone/iPad 的相机权限，并尽量使用 Safari 打开。");
                    resetToHome();
                    return;
                }

                let backCamera = devices.find(device =>
                    /back|rear|environment|后|背面/i.test(device.label || "")
                );

                const cameraId = backCamera ? backCamera.id : devices[0].id;

                const config = {
                    fps: 10,
                    qrbox: { width: 250, height: 250 },
                    aspectRatio: 1.0,
                    rememberLastUsedCamera: true,
                    showTorchButtonIfSupported: true,
                    showZoomSliderIfSupported: true
                };

                setStatus("正在启动摄像头...");

                await html5QrCode.start(
                    cameraId,
                    config,
                    onScanSuccess,
                    onScanFailure
                );

                scannerStarted = true;
                setStatus("请把二维码放到框内");
            } catch (err) {
                console.error("启动摄像头失败:", err);

                if (scanHandled) {
                    console.log("已成功扫码，忽略后续相机异常");
                    return;
                }

                let msg = "相机启动失败。";

                if (err && err.name === "NotAllowedError") {
                    msg += "\n请到系统设置或 Safari 设置中允许相机权限。";
                } else if (err && err.name === "NotFoundError") {
                    msg += "\n没有找到可用摄像头。";
                } else if (err && err.name === "NotReadableError") {
                    msg += "\n摄像头可能正被其他程序占用。";
                } else {
                    msg += "\n请尽量使用 Safari 打开，不要在微信或其他内置浏览器中打开。";
                }

                alert(msg);
                resetToHome();
            }
        }

        function onScanFailure(error) {
            // 正常现象，不弹窗
        }

        async function onScanSuccess(decodedText) {
            if (scanHandled) return;
            scanHandled = true;

            try {
                const fileName = String(decodedText || "").trim() + ".mp3";
                currentAudioFile = fileName;
                console.log("扫码结果:", decodedText, "=>", fileName);

                // 先显示全屏播放层，彻底盖住黑色扫码框
                showPlayerUI();

                audio.src = encodeURI(fileName);
                audio.load();

                try {
                    await audio.play();
                } catch (e) {
                    console.log("自动播放失败，需要手动点击:", e);
                }

                // 再后台静默停相机
                setTimeout(() => {
                    stopScannerSilently();
                }, 0);
            } catch (err) {
                console.error("扫码成功后处理失败:", err);
                alert("二维码识别成功，但播放音频失败。请检查 mp3 文件名是否和二维码内容一致。");
            }
        }

        function playAudio() {
            if (!currentAudioFile) return;

            audio.src = encodeURI(currentAudioFile);
            audio.load();
            audio.play().catch(err => {
                console.log("手动播放失败:", err);
                alert("播放失败，请确认音频文件存在，并且文件名和二维码内容一致。");
            });
        }

        function stopAudio() {
            audio.pause();
            audio.currentTime = 0;
        }

        async function rescanCard() {
            stopAudio();
            scanHandled = false;
            currentAudioFile = "";
            playScreen.style.display = "none";
            await stopScannerSilently();
            await startApp();
        }

        async function resetToHome() {
            scanHandled = false;
            currentAudioFile = "";

            await stopScannerSilently();

            audio.pause();
            audio.currentTime = 0;

            setupScreen.style.display = "block";
            scannerScreen.style.display = "none";
            playScreen.style.display = "none";
            playBtn.style.display = "none";
        }
    </script>
</body>
</html>
