<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小班听说游戏</title>
    <script src="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/html5-qrcode/2.2.0/html5-qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #F1F8E9; margin: 0; padding: 20px; text-align: center; }
        #setup-screen { margin-top: 120px; }
        .big-btn { 
            padding: 40px 80px; font-size: 32px; border-radius: 80px; 
            background: #4CAF50; color: white; border: none; 
            box-shadow: 0 12px 0 #2E7D32; cursor: pointer;
        }
        #reader { 
            width: 100%; max-width: 500px; margin: 0 auto; 
            border: 15px solid white; border-radius: 40px; 
            overflow: hidden; display: none; background: #000;
        }
        #play-btn { 
            display: none; width: 280px; height: 280px; background: #FF9800; 
            color: white; border: none; border-radius: 50%; 
            font-size: 120px; margin: 50px auto; 
            box-shadow: 0 15px 0 #E65100;
        }
        .status { font-size: 26px; color: #333; margin-top: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #2E7D32;">听说游戏开始啦</h1>
        <button class="big-btn" onclick="startApp()">点我开始</button>
        <p style="color: #888; margin-top: 30px;">(老师请帮小朋友点一下)</p>
    </div>

    <div id="reader"></div>
    <div id="status" class="status"></div>

    <div id="play-screen" style="display:none;">
        <button id="play-btn" onclick="playAudio()">▶️</button>
        <p class="status" style="color: #FF9800;">找到声音啦！快点球球</p>
        <p onclick="location.reload()" style="text-decoration:underline; color:#999; margin-top:30px;">换一张卡片</p>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        let html5QrCode;

        async function startApp() {
            // 解决 iOS 15 音频锁
            audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
            try { await audio.play(); } catch(e) {}

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            document.getElementById('status').innerText = "正在寻找后置镜头...";

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            // 强制要求后置摄像头 (facingMode: environment)
            const config = { 
                fps: 10, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0 
            };
            
            // 尝试第一种方式启动：明确要求后置摄像头
            html5QrCode.start(
                { facingMode: { exact: "environment" } }, 
                config, 
                onScanSuccess
            ).catch(err => {
                // 如果 exact 模式失败，尝试普通模式启动
                console.log("精确寻找失败，尝试普通模式...");
                html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    onScanSuccess
                ).catch(err2 => {
                    alert("相机启动失败！请确保已在浏览器设置中【允许】相机。");
                    location.reload();
                });
            });
        }

        function onScanSuccess(text) {
            const fileName = text.trim() + ".mp3";
            audio.src = fileName;
            document.getElementById('reader').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('play-screen').style.display = 'block';
            document.getElementById('play-btn').style.display = 'block';
            audio.play();
        }

        function playAudio() { audio.play(); }
    </script>
</body>
</html>
