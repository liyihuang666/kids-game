<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>小班听说游戏</title>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            background-color: #F1F8E9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        #setup-screen {
            margin-top: 120px;
        }

        .big-btn {
            padding: 40px 80px;
            font-size: 32px;
            border-radius: 80px;
            background: #4CAF50;
            color: white;
            border: none;
            box-shadow: 0 12px 0 #2E7D32;
            cursor: pointer;
        }

        #reader {
            width: 100%;
            max-width: 500px;
            margin: 20px auto 0;
            border: 15px solid white;
            border-radius: 40px;
            overflow: hidden;
            display: none;
            background: #000;
        }

        #play-btn {
            display: none;
            width: 280px;
            height: 280px;
            background: #FF9800;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 120px;
            margin: 50px auto;
            box-shadow: 0 15px 0 #E65100;
            cursor: pointer;
        }

        .status {
            font-size: 26px;
            color: #333;
            margin-top: 30px;
            font-weight: bold;
            line-height: 1.5;
        }

        .small-text {
            color: #888;
            margin-top: 30px;
            font-size: 18px;
        }

        .link-btn {
            text-decoration: underline;
            color: #999;
            margin-top: 30px;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #2E7D32;">听说游戏开始啦</h1>
        <button class="big-btn" onclick="startApp()">点我开始</button>
        <p class="small-text">(老师请帮小朋友点一下)</p>
    </div>

    <div id="reader"></div>
    <div id="status" class="status"></div>

    <div id="play-screen" style="display:none;">
        <button id="play-btn" onclick="playAudio()">▶️</button>
        <p class="status" style="color: #FF9800;">找到声音啦！快点球球</p>
        <p class="link-btn" onclick="resetGame()">换一张卡片</p>
    </div>

    <audio id="audio-player" playsinline webkit-playsinline></audio>

    <script>
        const audio = document.getElementById("audio-player");
        const setupScreen = document.getElementById("setup-screen");
        const reader = document.getElementById("reader");
        const statusText = document.getElementById("status");
        const playScreen = document.getElementById("play-screen");
        const playBtn = document.getElementById("play-btn");

        let html5QrCode;
        let scanLocked = false;
        let scannerStarted = false;

        async function unlockAudio() {
            audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
            try {
                await audio.play();
                audio.pause();
                audio.currentTime = 0;
            } catch (e) {
                console.log("音频解锁失败:", e);
            }
        }

        async function startApp() {
            scanLocked = false;

            await unlockAudio();

            setupScreen.style.display = "none";
            playScreen.style.display = "none";
            playBtn.style.display = "none";
            reader.style.display = "block";
            statusText.style.display = "block";
            statusText.innerText = "正在启动相机...";

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("当前浏览器不支持相机，请使用 Safari 打开。");
                resetGame();
                return;
            }

            if (!window.isSecureContext) {
                alert("当前网页不是 HTTPS 安全环境，无法调用相机。");
                resetGame();
                return;
            }

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            const config = {
                fps: 15,
                qrbox: { width: 300, height: 300 },
                aspectRatio: 1.0
            };

            try {
                // 先试最常见的 iPhone 后摄方式
                await html5QrCode.start(
                    { facingMode: { exact: "environment" } },
                    config,
                    onScanSuccess,
                    onScanFailure
                );
                scannerStarted = true;
                statusText.innerText = "请把二维码放到框内，稍微靠近一点";
            } catch (e1) {
                console.log("exact environment 失败:", e1);

                try {
                    // 退一步，用普通后摄
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        config,
                        onScanSuccess,
                        onScanFailure
                    );
                    scannerStarted = true;
                    statusText.innerText = "请把二维码放到框内，稍微靠近一点";
                } catch (e2) {
                    console.log("environment 失败:", e2);
                    alert("相机打开失败，请刷新页面后重试，并确认已允许 Safari 使用相机。");
                    resetGame();
                }
            }
        }

        function onScanFailure(error) {
            // 扫描过程中频繁失败属于正常现象，不弹窗
            // console.log("scan failure:", error);
        }

        async function onScanSuccess(decodedText) {
            if (scanLocked) return;
            scanLocked = true;

            const cleanText = decodedText.trim();
            const fileName = cleanText + ".mp3";

            console.log("扫码结果:", cleanText);
            console.log("将播放文件:", fileName);

            try {
                if (scannerStarted && html5QrCode) {
                    await html5QrCode.stop();
                    scannerStarted = false;
                }
            } catch (e) {
                console.log("停止扫码器失败:", e);
            }

            reader.style.display = "none";
            statusText.style.display = "none";
            playScreen.style.display = "block";
            playBtn.style.display = "block";

            audio.src = encodeURI(fileName);

            try {
                await audio.play();
            } catch (e) {
                console.log("自动播放失败，需要手动点击:", e);
            }

            audio.onerror = function () {
                alert("识别到了二维码，但没有找到对应音频： " + fileName + "。请检查 GitHub 里的 mp3 文件名是否完全一致。");
            };
        }

        function playAudio() {
            audio.play().catch(err => {
                console.log("手动播放失败:", err);
                alert("播放失败，请检查音频文件名是否正确。");
            });
        }

        async function resetGame() {
            try {
                if (scannerStarted && html5QrCode) {
                    await html5QrCode.stop();
                    scannerStarted = false;
                }
            } catch (e) {
                console.log("停止扫码器失败:", e);
            }

            audio.pause();
            audio.currentTime = 0;
            audio.src = "";
            scanLocked = false;

            setupScreen.style.display = "block";
            reader.style.display = "none";
            playScreen.style.display = "none";
            statusText.style.display = "none";
            playBtn.style.display = "none";
        }
    </script>
</body>
</html>
