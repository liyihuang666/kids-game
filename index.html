<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>小班听说游戏</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background-color: #F1F8E9;
      margin: 0;
      padding: 20px;
      text-align: center;
      -webkit-user-select: none;
      user-select: none;
    }

    #setup-screen {
      margin-top: 100px;
    }

    h1 {
      color: #2E7D32;
      margin-bottom: 24px;
      font-size: 54px;
      line-height: 1.25;
    }

    .big-btn {
      padding: 34px 64px;
      font-size: 30px;
      border-radius: 999px;
      background: #4CAF50;
      color: white;
      border: none;
      box-shadow: 0 10px 0 #2E7D32;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .small-text {
      color: #888;
      margin-top: 24px;
      font-size: 18px;
    }

    #scanner-screen {
      display: none;
      margin-top: 18px;
    }

    #reader {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      border: 12px solid #fff;
      border-radius: 28px;
      overflow: hidden;
      background: #000;
      min-height: 320px;
    }

    #status {
      font-size: 24px;
      color: #333;
      margin-top: 22px;
      font-weight: bold;
      line-height: 1.5;
      min-height: 40px;
    }

    .helper {
      color: #666;
      font-size: 18px;
      margin-top: 10px;
      line-height: 1.6;
    }

    #play-screen {
      display: none;
      margin-top: 38px;
    }

    #play-btn {
      display: inline-block;
      width: 220px;
      height: 220px;
      background: #FF9800;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 96px;
      box-shadow: 0 12px 0 #E65100;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 24px;
    }

    .status-big {
      font-size: 28px;
      color: #FF9800;
      margin: 10px 0 18px;
      font-weight: bold;
      line-height: 1.5;
    }

    .button-row {
      margin-top: 8px;
    }

    .action-btn {
      display: inline-block;
      min-width: 220px;
      padding: 20px 28px;
      margin: 10px 8px;
      font-size: 28px;
      border-radius: 24px;
      border: none;
      color: white;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .orange-btn {
      background: #FF9800;
      box-shadow: 0 8px 0 #E65100;
    }

    .green-btn {
      background: #4CAF50;
      box-shadow: 0 8px 0 #2E7D32;
    }

    .gray-btn {
      background: #90A4AE;
      box-shadow: 0 8px 0 #607D8B;
    }
  </style>
</head>
<body>

  <div id="setup-screen">
    <h1>听说游戏开始啦</h1>
    <button class="big-btn" id="start-btn">点我开始</button>
    <p class="small-text">(老师请帮小朋友点一下)</p>
  </div>

  <div id="scanner-screen">
    <div id="reader"></div>
    <div id="status"></div>
    <div class="helper">请把二维码放近一点、摆正一点、光线亮一点</div>
  </div>

  <div id="play-screen">
    <button id="play-btn">▶️</button>
    <div class="status-big">找到声音啦！快点球球</div>

    <div class="button-row">
      <button class="action-btn orange-btn" id="replay-btn">再听一次</button>
      <button class="action-btn green-btn" id="rescan-btn">再扫一个</button>
    </div>

    <div class="button-row">
      <button class="action-btn gray-btn" id="stop-btn">停止播放</button>
    </div>
  </div>

  <audio id="audio-player" playsinline webkit-playsinline preload="auto"></audio>

  <script>
    const audio = document.getElementById("audio-player");
    const setupScreen = document.getElementById("setup-screen");
    const scannerScreen = document.getElementById("scanner-screen");
    const reader = document.getElementById("reader");
    const statusText = document.getElementById("status");
    const playScreen = document.getElementById("play-screen");

    const startBtn = document.getElementById("start-btn");
    const playBtn = document.getElementById("play-btn");
    const replayBtn = document.getElementById("replay-btn");
    const rescanBtn = document.getElementById("rescan-btn");
    const stopBtn = document.getElementById("stop-btn");

    let html5QrCode = null;
    let scannerStarted = false;
    let scanHandled = false;
    let currentAudioFile = "";

    function setStatus(text) {
      statusText.innerText = text || "";
    }

    function showHome() {
      setupScreen.style.display = "block";
      scannerScreen.style.display = "none";
      playScreen.style.display = "none";
      setStatus("");
    }

    function showScanner() {
      setupScreen.style.display = "none";
      scannerScreen.style.display = "block";
      playScreen.style.display = "none";
    }

    function showPlayer() {
      setupScreen.style.display = "none";
      scannerScreen.style.display = "none";
      playScreen.style.display = "block";
    }

    async function unlockAudio() {
      audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
      try {
        await audio.play();
        audio.pause();
        audio.currentTime = 0;
      } catch (e) {
        console.log("音频解锁失败:", e);
      }
    }

    function getQrboxSize(viewfinderWidth, viewfinderHeight) {
      const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
      const size = Math.floor(minEdge * 0.78);
      return {
        width: Math.max(220, Math.min(size, 380)),
        height: Math.max(220, Math.min(size, 380))
      };
    }

    async function stopScannerSilently() {
      if (html5QrCode && scannerStarted) {
        try {
          await html5QrCode.stop();
        } catch (e) {
          console.log("停止扫码器失败（忽略）:", e);
        }
      }
      scannerStarted = false;
    }

    async function clearScannerSilently() {
      if (html5QrCode) {
        try {
          await html5QrCode.clear();
        } catch (e) {
          console.log("清理扫码器失败（忽略）:", e);
        }
      }
    }

    async function createScanner() {
      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader", {
          formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE],
          verbose: false
        });
      }
    }

    async function startScanner() {
      scanHandled = false;
      audio.pause();
      audio.currentTime = 0;

      if (!window.isSecureContext) {
        alert("当前网页不是安全环境，请确认你打开的是 GitHub Pages 的 https 链接。");
        showHome();
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert("当前浏览器不支持摄像头，请尽量使用 Safari 打开。");
        showHome();
        return;
      }

      await unlockAudio();
      showScanner();
      setStatus("正在请求相机权限...");

      await stopScannerSilently();
      await clearScannerSilently();
      html5QrCode = null;
      reader.innerHTML = "";
      await createScanner();

      try {
        const tempStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        tempStream.getTracks().forEach(track => track.stop());
      } catch (e) {
        console.log("预请求相机失败:", e);
      }

      const config = {
        fps: 14,
        qrbox: getQrboxSize,
        rememberLastUsedCamera: true,
        showTorchButtonIfSupported: true,
        showZoomSliderIfSupported: true,
        experimentalFeatures: {
          useBarCodeDetectorIfSupported: false
        }
      };

      try {
        setStatus("正在启动后置相机...");
        await html5QrCode.start(
          { facingMode: "environment" },
          config,
          onScanSuccess,
          onScanFailure
        );
        scannerStarted = true;
        setStatus("请把二维码放到框内");
        return;
      } catch (e1) {
        console.log("后置相机启动失败:", e1);
      }

      try {
        setStatus("正在寻找可用摄像头...");
        const devices = await Html5Qrcode.getCameras();

        if (!devices || devices.length === 0) {
          throw new Error("NO_CAMERA_FOUND");
        }

        const backCamera = devices.find(device =>
          /back|rear|environment|后|背/i.test(device.label || "")
        );

        const cameraId = backCamera ? backCamera.id : devices[0].id;

        setStatus("正在启动摄像头...");
        await html5QrCode.start(
          cameraId,
          config,
          onScanSuccess,
          onScanFailure
        );
        scannerStarted = true;
        setStatus("请把二维码放到框内");
        return;
      } catch (e2) {
        console.log("cameraId 启动失败:", e2);
      }

      alert("相机启动失败。请尽量使用 Safari 打开，并检查系统相机权限。");
      await stopScannerSilently();
      await clearScannerSilently();
      html5QrCode = null;
      showHome();
    }

    function onScanFailure(error) {
      // 连续扫描失败属于正常现象，这里不弹窗
    }

    async function onScanSuccess(decodedText) {
      if (scanHandled) return;
      scanHandled = true;

      try {
        const cleanText = String(decodedText || "").trim();
        if (!cleanText) {
          scanHandled = false;
          return;
        }

        currentAudioFile = cleanText + ".mp3";
        console.log("扫码结果:", cleanText, "=>", currentAudioFile);

        // 先切到播放页，避免 stop() 报错时又跳回首页
        showPlayer();

        audio.src = encodeURI(currentAudioFile);
        audio.load();

        try {
          await audio.play();
        } catch (e) {
          console.log("自动播放失败，需要手动点击:", e);
        }

        // 再静默关相机，不弹错
        stopScannerSilently();
      } catch (err) {
        console.error("扫码成功后处理失败:", err);
        alert("二维码识别成功，但播放音频失败。请检查 mp3 文件名是否和二维码内容一致。");
      }
    }

    async function playCurrentAudio() {
      if (!currentAudioFile) {
        alert("还没有扫描到音频。");
        return;
      }

      try {
        audio.src = encodeURI(currentAudioFile);
        audio.load();
        await audio.play();
      } catch (err) {
        console.log("播放失败:", err);
        alert("播放失败，请确认 mp3 文件存在，并且文件名和二维码内容一致。");
      }
    }

    function stopAudio() {
      audio.pause();
      audio.currentTime = 0;
    }

    async function rescanNext() {
      stopAudio();
      currentAudioFile = "";
      scanHandled = false;
      await startScanner();
    }

    startBtn.addEventListener("click", startScanner);
    playBtn.addEventListener("click", playCurrentAudio);
    replayBtn.addEventListener("click", playCurrentAudio);
    stopBtn.addEventListener("click", stopAudio);
    rescanBtn.addEventListener("click", rescanNext);

    document.addEventListener("visibilitychange", async () => {
      if (document.hidden) {
        await stopScannerSilently();
      }
    });

    window.addEventListener("pagehide", async () => {
      await stopScannerSilently();
    });
  </script>
</body>
</html>
